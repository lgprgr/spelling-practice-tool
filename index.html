<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Practice</title>
  <style>
    body {
      background: #eef2f6;
      color: #172033;
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 32px 20px;
      line-height: 1.5;
    }

    .app {
      background: #ffffff;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
      box-sizing: border-box;
      margin: 0 auto;
      max-width: 720px;
      padding: 28px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.15;
      margin: 0;
    }

    label {
      color: #344054;
      font-weight: 700;
    }

    .header {
      margin-bottom: 8px;
    }

    .hint {
      color: #667085;
      margin: 8px 0 0;
    }

    .section {
      border-top: 1px solid #e4e8ef;
      margin-top: 24px;
      padding-top: 20px;
    }

    button, input, select {
      border-radius: 6px;
      font-size: 18px;
      margin: 0;
      padding: 11px 12px;
    }

    button {
      border: 1px solid #bdc7d6;
      background: #ffffff;
      color: #172033;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #f4f7fb;
    }

    button.primary {
      border-color: #2563eb;
      color: #1d4ed8;
    }

    button.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    button.danger {
      border-color: #dc2626;
      color: #b91c1c;
    }

    button.danger:hover {
      background: #fef2f2;
    }

    input, select {
      border: 1px solid #bdc7d6;
      width: 100%;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      outline: none;
    }

    input[type="range"] {
      accent-color: #2563eb;
      padding: 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .practice-grid {
      display: grid;
      column-gap: 14px;
      row-gap: 12px;
      grid-template-columns: repeat(3, 1fr);
    }

    .practice-column {
      display: grid;
      gap: 10px;
    }

    .practice-column .checkbox-label {
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.35;
    }

    .phone-options {
      display: grid;
      gap: 10px;
    }

    .answer-input {
      margin-top: 18px;
    }

    .answer-actions {
      margin-top: 14px;
    }

    .result {
      font-size: 22px;
      font-weight: bold;
      margin-top: 16px;
      min-height: 33px;
    }

    #correctAnswer {
      color: #344054;
      min-height: 24px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-row {
      display: grid;
      gap: 4px;
    }

    .range-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .checkbox-label {
      align-items: center;
      display: flex;
      gap: 8px;
      font-weight: 400;
    }

    .checkbox-label input {
      margin: 0;
      width: auto;
    }

    .version {
      color: #777;
      font-size: 14px;
      margin-top: 32px;
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .app {
        padding: 20px;
      }

      .practice-grid,
      .practice-column {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Spelling Practice</h1>
      <p class="hint">Listen to the spelling, type what you hear, then check your answer.</p>
    </header>

    <section class="section" aria-label="Speech settings">
      <div class="controls">
        <div class="control-row">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect">
            <option value="">Default voice</option>
          </select>
        </div>

        <div class="control-row">
          <label class="range-label" for="speedSlider">
            <span>Speed</span>
            <span id="speedValue">0.80x</span>
          </label>
          <input id="speedSlider" type="range" min="0.4" max="1.2" step="0.05" value="0.8" />
        </div>
      </div>
    </section>

    <section class="section" aria-label="Choose practice">
      <div class="practice-grid">
        <button class="primary" id="nameButton">Spell name</button>
        <button class="primary" id="emailButton">Spell email</button>
        <button class="primary" id="phoneButton">Spell phone</button>

        <div class="practice-column">
          <label class="checkbox-label" for="pauseNameParts">
            <input id="pauseNameParts" type="checkbox" checked />
            <span>Pause between name parts</span>
          </label>
        </div>

        <div class="practice-column">
          <label class="checkbox-label" for="readDomainAsWord">
            <input id="readDomainAsWord" type="checkbox" checked />
            <span>Read domain as word</span>
          </label>
        </div>

        <div class="practice-column phone-options">
          <label class="checkbox-label" for="pausePhoneGroups">
            <input id="pausePhoneGroups" type="checkbox" checked />
            <span>Pause between phone groups</span>
          </label>
          <label class="checkbox-label" for="readLastFourAsPairs">
            <input id="readLastFourAsPairs" type="checkbox" />
            <span>Read last four as pairs</span>
          </label>
        </div>
      </div>
    </section>

    <section class="section" aria-label="Answer">
      <div class="buttons">
        <button id="repeatButton">Repeat spelling</button>
        <button id="readButton">Read normally</button>
        <button class="danger" id="stopButton">Stop spelling</button>
      </div>

      <div class="control-row answer-input">
        <label for="answer">Type your answer</label>
        <input id="answer" type="text" autocomplete="off" />
      </div>

      <div class="buttons answer-actions">
        <button class="primary" id="checkButton">Check answer</button>
        <button id="showButton">Show correct answer</button>
      </div>

      <div id="result" class="result"></div>
      <p id="correctAnswer"></p>
    </section>

    <p class="version">Version 1.3.0</p>
  </main>

  <script>
    const START_MESSAGE = "Choose Spell name, Spell email, or Spell phone to start.";
    const ROUND_START_DELAY_MS = 500;
    const NAME_PAUSE_MS = 450;
    const EMAIL_PAUSE_MS = 350;
    const PHONE_PAUSE_MS = 450;

    const emailCharacterNames = {
      "@": "at",
      ".": "dot",
      "_": "underscore",
      "-": "dash",
      "+": "plus",
      " ": "space"
    };

    const michiganAreaCodes = [
      "231", "248", "269", "313", "517", "586",
      "616", "734", "810", "906", "947", "989"
    ];

    let firstNames = [];
    let lastNames = [];
    let emailWords = [];
    let emailDomains = [];
    let currentAnswer = "";
    let currentType = "";
    let speechRunId = 0;
    let startSpeechTimeoutId = null;

    const answerInput = document.getElementById("answer");
    const result = document.getElementById("result");
    const correctAnswer = document.getElementById("correctAnswer");
    const practiceButtons = {
      name: document.getElementById("nameButton"),
      email: document.getElementById("emailButton"),
      phone: document.getElementById("phoneButton")
    };
    const voiceSelect = document.getElementById("voiceSelect");
    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");
    const pauseNameParts = document.getElementById("pauseNameParts");
    const readDomainAsWord = document.getElementById("readDomainAsWord");
    const pausePhoneGroups = document.getElementById("pausePhoneGroups");
    const readLastFourAsPairs = document.getElementById("readLastFourAsPairs");

    let voices = [];

    function getRandomItem(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function getRandomNumber(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function hasLoadedData() {
      return firstNames.length > 0
        && lastNames.length > 0
        && emailWords.length > 0
        && emailDomains.length > 0;
    }

    function resetRound() {
      if (startSpeechTimeoutId) {
        window.clearTimeout(startSpeechTimeoutId);
        startSpeechTimeoutId = null;
      }

      answerInput.value = "";
      result.textContent = "";
      correctAnswer.textContent = "";
      answerInput.focus();
    }

    function stopSpelling() {
      if (startSpeechTimeoutId) {
        window.clearTimeout(startSpeechTimeoutId);
        startSpeechTimeoutId = null;
      }

      speechRunId += 1;
      window.speechSynthesis.cancel();
    }

    function setActivePractice(type) {
      Object.entries(practiceButtons).forEach(([practiceType, button]) => {
        button.classList.toggle("active", practiceType === type);
      });
    }

    function startRound(type, answer, placeholder) {
      currentType = type;
      currentAnswer = answer;
      answerInput.placeholder = placeholder;
      setActivePractice(type);
      resetRound();
      startSpeechTimeoutId = window.setTimeout(() => {
        startSpeechTimeoutId = null;
        speakSpelling();
      }, ROUND_START_DELAY_MS);
    }

    function newName() {
      if (!hasLoadedData()) {
        result.textContent = "Name data is still loading. Try again in a moment.";
        result.style.color = "#555";
        return;
      }

      const answer = `${getRandomItem(firstNames)} ${getRandomItem(lastNames)}`;
      startRound("name", answer, "First Last");
    }

    function makeNameEmailLocalPart() {
      const first = getRandomItem(firstNames).toLowerCase();
      const last = getRandomItem(lastNames).toLowerCase();
      const firstInitial = first.charAt(0);
      const number = getRandomNumber(1, 99);
      const patterns = [
        `${first}.${last}`,
        `${first}_${last}`,
        `${first}${last}`,
        `${first}.${last}${number}`,
        `${firstInitial}.${last}`,
        `${first}${number}`
      ];

      return getRandomItem(patterns);
    }

    function makeWordEmailLocalPart() {
      const firstWord = getRandomItem(emailWords);
      const secondWord = getRandomItem(emailWords);
      const number = getRandomNumber(1, 99);
      const patterns = [
        `${firstWord}${secondWord}`,
        `${firstWord}.${secondWord}`,
        `${firstWord}_${secondWord}`,
        `${firstWord}${number}`,
        `${firstWord}.${secondWord}${number}`,
        `${firstWord}_${number}`
      ];

      return getRandomItem(patterns);
    }

    function newEmail() {
      if (!hasLoadedData()) {
        result.textContent = "Email data is still loading. Try again in a moment.";
        result.style.color = "#555";
        return;
      }

      const localPart = Math.random() < 0.6
        ? makeNameEmailLocalPart()
        : makeWordEmailLocalPart();
      const domain = getRandomItem(emailDomains);

      startRound("email", `${localPart}@${domain}`, "example@gmail.com");
    }

    function newPhone() {
      const areaCode = getRandomItem(michiganAreaCodes);
      const prefix = String(getRandomNumber(200, 999));
      const lineNumber = String(getRandomNumber(0, 9999)).padStart(4, "0");

      startRound("phone", `${areaCode}-${prefix}-${lineNumber}`, "248-555-1234");
    }

    async function loadList(path) {
      const response = await fetch(path);

      if (!response.ok) {
        throw new Error(`Could not load ${path}`);
      }

      const names = await response.json();

      if (!Array.isArray(names) || names.length === 0) {
        throw new Error(`${path} is empty or invalid`);
      }

      return names;
    }

    async function loadData() {
      try {
        [firstNames, lastNames, emailWords, emailDomains] = await Promise.all([
          loadList("data/first-names.json"),
          loadList("data/last-names.json"),
          loadList("data/email-words.json"),
          loadList("data/email-domains.json")
        ]);
      } catch (error) {
        console.error(error);
        result.textContent = "Could not load local data files. Start the local server and refresh.";
        result.style.color = "red";
      }
    }

    function populateVoices() {
      const selectedVoiceName = voiceSelect.value;
      voices = window.speechSynthesis.getVoices();

      voiceSelect.innerHTML = '<option value="">Default voice</option>';

      voices.forEach((voice) => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.appendChild(option);
      });

      voiceSelect.value = selectedVoiceName;
    }

    function getSelectedVoice() {
      return voices.find((voice) => voice.name === voiceSelect.value) || null;
    }

    function updateSpeedLabel() {
      speedValue.textContent = `${Number(speedSlider.value).toFixed(2)}x`;
    }

    function spellCharacters(text, characterNames = { " ": "space" }) {
      return text
        .split("")
        .map((character) => characterNames[character] || character)
        .join(", ");
    }

    function getEmailParts(emailAddress) {
      const [localPart, domain] = emailAddress.split("@");

      if (!localPart || !domain) {
        return null;
      }

      const localPartText = spellCharacters(localPart, emailCharacterNames);
      const domainText = readDomainAsWord.checked
        ? domain.split(".").join(", dot, ")
        : spellCharacters(domain, emailCharacterNames);

      return [localPartText, "at", domainText];
    }

    function readDigitPair(pair) {
      return pair.startsWith("0") ? pair.split("").join(", ") : pair;
    }

    function getPhoneGroupText(group, index) {
      if (index === 2 && readLastFourAsPairs.checked) {
        return `${readDigitPair(group.slice(0, 2))}, ${readDigitPair(group.slice(2))}`;
      }

      return spellCharacters(group);
    }

    function getPhoneSpellingText(phoneNumber) {
      return phoneNumber
        .split("-")
        .map(getPhoneGroupText)
        .join(". ");
    }

    function makeUtterance(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      const selectedVoice = getSelectedVoice();

      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }

      utterance.rate = Number(speedSlider.value);
      utterance.pitch = 1;
      return utterance;
    }

    function speakPhoneGroups(phoneNumber, runId) {
      const groups = phoneNumber.split("-");

      speakSpeechParts(groups.map(getPhoneGroupText), PHONE_PAUSE_MS, runId);
    }

    function speakSpeechParts(parts, pauseMs, runId) {
      function speakPart(index) {
        if (runId !== speechRunId || index >= parts.length) {
          return;
        }

        const utterance = makeUtterance(parts[index]);

        if (index < parts.length - 1) {
          utterance.onend = () => {
            window.setTimeout(() => {
              speakPart(index + 1);
            }, pauseMs);
          };
        }

        window.speechSynthesis.speak(utterance);
      }

      speakPart(0);
    }

    function speakEmailParts(emailAddress, runId) {
      const emailParts = getEmailParts(emailAddress);

      if (!emailParts) {
        window.speechSynthesis.speak(makeUtterance(spellCharacters(emailAddress, emailCharacterNames)));
        return;
      }

      speakSpeechParts(emailParts, EMAIL_PAUSE_MS, runId);
    }

    function speakNameParts(name, runId) {
      const nameParts = name
        .split(/\s+/)
        .filter(Boolean)
        .map((part) => spellCharacters(part));

      speakSpeechParts(nameParts, NAME_PAUSE_MS, runId);
    }

    function getNormalEmailParts(emailAddress) {
      const [localPart, domain] = emailAddress.split("@");

      if (!localPart || !domain) {
        return null;
      }

      const localPartText = localPart
        .replace(/\./g, " dot ")
        .replace(/_/g, " underscore ")
        .replace(/-/g, " dash ")
        .replace(/\+/g, " plus ")
        .replace(/\s+/g, " ")
        .trim();
      const domainText = domain.split(".").join(" dot ");

      return [localPartText, "at", domainText];
    }

    function getNormalReadingText() {
      if (currentType === "phone") {
        return getPhoneSpellingText(currentAnswer);
      }

      return currentAnswer;
    }

    function readEmailNormally(runId) {
      const emailParts = getNormalEmailParts(currentAnswer);

      if (!emailParts) {
        window.speechSynthesis.speak(makeUtterance(currentAnswer));
        return;
      }

      speakSpeechParts(emailParts, EMAIL_PAUSE_MS, runId);
    }

    function readNormally() {
      if (!currentAnswer) {
        result.textContent = START_MESSAGE;
        result.style.color = "#555";
        return;
      }

      stopSpelling();

      if (currentType === "email") {
        const runId = speechRunId;
        readEmailNormally(runId);
        return;
      }

      window.speechSynthesis.speak(makeUtterance(getNormalReadingText()));
    }

    function speakSpelling() {
      if (!currentAnswer) {
        result.textContent = START_MESSAGE;
        result.style.color = "#555";
        return;
      }

      window.speechSynthesis.cancel();
      speechRunId += 1;
      const runId = speechRunId;

      if (currentType === "phone" && pausePhoneGroups.checked) {
        speakPhoneGroups(currentAnswer, runId);
        return;
      }

      if (currentType === "email") {
        speakEmailParts(currentAnswer, runId);
        return;
      }

      if (currentType === "name" && pauseNameParts.checked) {
        speakNameParts(currentAnswer, runId);
        return;
      }

      let spellingText = spellCharacters(currentAnswer);

      if (currentType === "phone") {
        spellingText = getPhoneSpellingText(currentAnswer);
      }

      window.speechSynthesis.speak(makeUtterance(spellingText));
    }

    function normalize(text) {
      return text.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function getPhoneDigits(phoneNumber) {
      return phoneNumber.replace(/\D/g, "");
    }

    function isValidPhoneAnswer(answer) {
      return /^\d{10}$/.test(answer)
        || /^\d{3} \d{3} \d{4}$/.test(answer)
        || /^\d{3}-\d{3}-\d{4}$/.test(answer);
    }

    function isCorrectAnswer(answer) {
      if (currentType === "phone") {
        return isValidPhoneAnswer(answer)
          && getPhoneDigits(answer) === getPhoneDigits(currentAnswer);
      }

      return normalize(answer) === normalize(currentAnswer);
    }

    function checkAnswer() {
      if (!currentAnswer) {
        result.textContent = START_MESSAGE;
        result.style.color = "#555";
        correctAnswer.textContent = "";
        return;
      }

      const answer = answerInput.value;

      if (isCorrectAnswer(answer)) {
        result.textContent = "Correct!";
        result.style.color = "green";
        correctAnswer.textContent = "";
      } else {
        result.textContent = "Incorrect.";
        result.style.color = "red";
        correctAnswer.textContent = "";
      }
    }

    function showCorrectAnswer() {
      if (!currentAnswer) {
        result.textContent = START_MESSAGE;
        result.style.color = "#555";
        correctAnswer.textContent = "";
        return;
      }

      correctAnswer.textContent = `Correct answer: ${currentAnswer}`;
    }

    practiceButtons.name.addEventListener("click", newName);
    practiceButtons.email.addEventListener("click", newEmail);
    practiceButtons.phone.addEventListener("click", newPhone);
    document.getElementById("repeatButton").addEventListener("click", speakSpelling);
    document.getElementById("readButton").addEventListener("click", readNormally);
    document.getElementById("stopButton").addEventListener("click", stopSpelling);
    document.getElementById("checkButton").addEventListener("click", checkAnswer);
    document.getElementById("showButton").addEventListener("click", showCorrectAnswer);
    speedSlider.addEventListener("input", updateSpeedLabel);

    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    loadData();
    populateVoices();
    updateSpeedLabel();
    window.speechSynthesis.addEventListener("voiceschanged", populateVoices);
  </script>
</body>
</html>
