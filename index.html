<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Practice</title>
  <style>
    body {
      background: #eef2f6;
      color: #172033;
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 32px 20px;
      line-height: 1.5;
    }

    .app {
      background: #ffffff;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
      box-sizing: border-box;
      margin: 0 auto;
      max-width: 720px;
      padding: 28px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.15;
      margin: 0;
    }

    label {
      color: #344054;
      font-weight: 700;
    }

    .header {
      margin-bottom: 8px;
    }

    .hint {
      color: #667085;
      margin: 8px 0 0;
    }

    .section {
      border-top: 1px solid #e4e8ef;
      margin-top: 24px;
      padding-top: 20px;
    }

    button, input, select {
      border-radius: 6px;
      font-size: 18px;
      margin: 0;
      padding: 11px 12px;
    }

    button {
      border: 1px solid #bdc7d6;
      background: #ffffff;
      color: #172033;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #f4f7fb;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button.primary {
      border-color: #2563eb;
      color: #1d4ed8;
    }

    button.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    button.danger {
      border-color: #dc2626;
      color: #b91c1c;
    }

    button.danger:hover {
      background: #fef2f2;
    }

    button.next-ready {
      background: #16a34a;
      border-color: #16a34a;
      color: #ffffff;
    }

    button.next-ready:hover {
      background: #15803d;
    }

    input, select {
      border: 1px solid #bdc7d6;
      width: 100%;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      outline: none;
    }

    input[type="range"] {
      accent-color: #2563eb;
      padding: 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .practice-grid {
      display: grid;
      column-gap: 14px;
      row-gap: 12px;
      grid-template-columns: repeat(4, 1fr);
    }

    .practice-column {
      display: grid;
      gap: 10px;
    }

    .practice-column .checkbox-label {
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.35;
    }

    .phone-options {
      display: grid;
      gap: 10px;
    }

    .practice-spacer {
      min-height: 1px;
    }

    .answer-input {
      margin-top: 18px;
    }

    .answer-input input {
      background: #fbfdff;
      border-color: #94a3b8;
      font-size: 22px;
      padding: 14px 12px;
    }

    .answer-help {
      color: #667085;
      font-size: 14px;
      margin: 2px 0 0;
      min-height: 21px;
    }

    .answer-actions {
      margin-top: 14px;
    }

    .result {
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 22px;
      font-weight: bold;
      margin-top: 16px;
      min-height: 35px;
      padding: 10px 12px;
    }

    .result:empty {
      border-color: transparent;
      padding-bottom: 0;
      padding-top: 0;
    }

    .result.success {
      background: #ecfdf3;
      border-color: #86efac;
      color: #166534;
    }

    .result.error {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #b91c1c;
    }

    .result.neutral {
      background: #f4f7fb;
      border-color: #d7dee8;
      color: #344054;
    }

    .progress {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-top: 16px;
    }

    .progress p {
      color: #344054;
      font-weight: 700;
      margin: 0;
    }

    .progress .checkbox-label {
      font-weight: 700;
    }

    .progress-details {
      align-items: center;
      display: none;
      gap: 10px;
    }

    .progress.counter-enabled .progress-details {
      display: flex;
    }

    .progress button {
      font-size: 14px;
      padding: 7px 10px;
    }

    #correctAnswer {
      color: #344054;
      min-height: 24px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-row {
      display: grid;
      gap: 4px;
    }

    .range-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .checkbox-label {
      align-items: center;
      display: flex;
      gap: 8px;
      font-weight: 400;
    }

    .checkbox-label input {
      margin: 0;
      width: auto;
    }

    .version {
      color: #777;
      font-size: 12px;
      margin: 28px 0 0;
      text-align: right;
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .app {
        padding: 20px;
      }

      .practice-grid,
      .practice-column {
        grid-template-columns: 1fr;
      }

      .buttons {
        flex-direction: column;
      }

      .buttons button,
      .practice-grid button {
        width: 100%;
      }

      .progress {
        align-items: stretch;
        flex-direction: column;
      }

      .progress-details {
        align-items: stretch;
        flex-direction: column;
      }

      .practice-spacer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Spelling Practice</h1>
      <p class="hint">Listen to the spelling, type what you hear, then check your answer.</p>
    </header>

    <section class="section" aria-label="Speech settings">
      <div class="controls">
        <div class="control-row">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect">
            <option value="">Default voice</option>
          </select>
        </div>

        <div class="control-row">
          <label class="range-label" for="speedSlider">
            <span>Speed</span>
            <span id="speedValue">0.60x</span>
          </label>
          <input id="speedSlider" type="range" min="0.4" max="1.2" step="0.05" value="0.6" />
        </div>
      </div>
    </section>

    <section class="section" aria-label="Choose practice">
      <div class="practice-grid">
        <button class="primary" id="nameButton">Spell name</button>
        <button class="primary" id="emailButton">Spell email</button>
        <button class="primary" id="phoneButton">Spell phone</button>
        <button class="primary" id="surpriseButton">Surprise me</button>

        <div class="practice-column">
          <label class="checkbox-label" for="pauseNameParts">
            <input id="pauseNameParts" type="checkbox" checked />
            <span>Pause between name parts</span>
          </label>
        </div>

        <div class="practice-column">
          <label class="checkbox-label" for="readDomainAsWord">
            <input id="readDomainAsWord" type="checkbox" checked />
            <span>Read domain as word</span>
          </label>
        </div>

        <div class="practice-column phone-options">
          <label class="checkbox-label" for="pausePhoneGroups">
            <input id="pausePhoneGroups" type="checkbox" checked />
            <span>Pause between phone groups</span>
          </label>
          <label class="checkbox-label" for="readLastFourAsPairs">
            <input id="readLastFourAsPairs" type="checkbox" />
            <span>Read last four as pairs</span>
          </label>
        </div>
        <div class="practice-column practice-spacer"></div>
      </div>
    </section>

    <section class="section" aria-label="Answer">
      <div class="buttons">
        <button id="repeatButton">Repeat spelling</button>
        <button id="readButton">Read normally</button>
        <button class="danger" id="stopButton">Stop spelling</button>
      </div>

      <div class="control-row answer-input">
        <label for="answer">Type your answer</label>
        <input id="answer" type="text" autocomplete="off" />
        <p id="answerHelp" class="answer-help"></p>
      </div>

      <div class="buttons answer-actions">
        <button class="primary" id="checkButton">Check answer</button>
        <button id="nextButton">Next</button>
        <button id="showButton">Show correct answer</button>
      </div>

      <div id="result" class="result"></div>
      <p id="correctAnswer"></p>

      <div id="progressPanel" class="progress" aria-label="Progress">
        <label class="checkbox-label" for="counterToggle">
          <input id="counterToggle" type="checkbox" />
          <span>Score chase</span>
        </label>
        <div class="progress-details">
          <p id="progressText">Spelled: 0 | Correct: 0</p>
          <button id="resetCounterButton">Reset counter</button>
        </div>
      </div>
    </section>

    <p class="version">Version 1.3.3</p>
  </main>

  <script>
    const START_MESSAGE = "Choose Spell name, Spell email, Spell phone, or Surprise me to start.";
    const ROUND_START_DELAY_MS = 500;
    const NAME_PAUSE_MS = 450;
    const EMAIL_PAUSE_MS = 350;
    const PHONE_PAUSE_MS = 450;

    const emailCharacterNames = {
      "@": "at",
      ".": "dot",
      "_": "underscore",
      "-": "dash",
      "+": "plus",
      " ": "space"
    };

    const michiganAreaCodes = [
      "231", "248", "269", "313", "517", "586",
      "616", "734", "810", "906", "947", "989"
    ];

    let firstNames = [];
    let lastNames = [];
    let emailWords = [];
    let emailDomains = [];
    let currentAnswer = "";
    let currentType = "";
    let currentMode = "";
    let speechRunId = 0;
    let startSpeechTimeoutId = null;
    let hasData = false;
    let spelledCount = 0;
    let correctCount = 0;
    let currentRoundCounted = false;
    let currentRoundCorrect = false;
    let currentRoundMissed = false;
    let repeatUsed = false;
    let readNormallyUsed = false;

    const answerInput = document.getElementById("answer");
    const answerHelp = document.getElementById("answerHelp");
    const result = document.getElementById("result");
    const correctAnswer = document.getElementById("correctAnswer");
    const repeatButton = document.getElementById("repeatButton");
    const readButton = document.getElementById("readButton");
    const showButton = document.getElementById("showButton");
    const nextButton = document.getElementById("nextButton");
    const counterToggle = document.getElementById("counterToggle");
    const progressPanel = document.getElementById("progressPanel");
    const progressText = document.getElementById("progressText");
    const practiceButtons = {
      name: document.getElementById("nameButton"),
      email: document.getElementById("emailButton"),
      phone: document.getElementById("phoneButton"),
      surprise: document.getElementById("surpriseButton")
    };
    const voiceSelect = document.getElementById("voiceSelect");
    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");
    const pauseNameParts = document.getElementById("pauseNameParts");
    const readDomainAsWord = document.getElementById("readDomainAsWord");
    const pausePhoneGroups = document.getElementById("pausePhoneGroups");
    const readLastFourAsPairs = document.getElementById("readLastFourAsPairs");

    let voices = [];

    function getRandomItem(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function getRandomNumber(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function setDataButtonsEnabled(isEnabled) {
      practiceButtons.name.disabled = !isEnabled;
      practiceButtons.email.disabled = !isEnabled;
      practiceButtons.surprise.disabled = !isEnabled;
    }

    function setResult(message, type = "neutral") {
      result.textContent = message;
      result.classList.remove("success", "error", "neutral");

      if (message) {
        result.classList.add(type);
      }
    }

    function clearResult() {
      setResult("");
    }

    function updateProgress() {
      progressText.textContent = `Spelled: ${spelledCount} | Correct: ${correctCount}`;
    }

    function isCounterEnabled() {
      return counterToggle.checked;
    }

    function resetCounter() {
      spelledCount = 0;
      correctCount = 0;
      updateProgress();
      focusAnswerAtEnd();
    }

    function updateShowAnswerButton() {
      showButton.disabled = isCounterEnabled() && !currentRoundMissed;
    }

    function updateCounterUI() {
      const counterEnabled = isCounterEnabled();

      progressPanel.classList.toggle("counter-enabled", counterEnabled);
      if (counterEnabled) {
        resetCounter();
      }

      if (counterEnabled) {
        correctAnswer.textContent = "";
      }

      updateShowAnswerButton();
      updateRoundActionButtons();
    }

    function updateRoundActionButtons() {
      const counterEnabled = isCounterEnabled();

      repeatButton.disabled = !currentAnswer || (counterEnabled && repeatUsed);
      readButton.disabled = !currentAnswer || (counterEnabled && readNormallyUsed);
    }

    function updateNextButton() {
      const typeLabel = currentMode || currentType || "item";
      nextButton.textContent = `Next ${typeLabel}`;
      nextButton.disabled = !currentAnswer;
      nextButton.classList.toggle("next-ready", currentRoundCorrect);
    }

    function cancelPendingSpeech() {
      if (startSpeechTimeoutId) {
        window.clearTimeout(startSpeechTimeoutId);
        startSpeechTimeoutId = null;
      }
    }

    function resetRound() {
      cancelPendingSpeech();
      answerInput.value = "";
      currentRoundCounted = false;
      currentRoundCorrect = false;
      currentRoundMissed = false;
      repeatUsed = false;
      readNormallyUsed = false;
      clearResult();
      correctAnswer.textContent = "";
      updateRoundActionButtons();
      updateShowAnswerButton();
      updateNextButton();
      focusAnswerAtEnd();
    }

    function focusAnswerAtEnd() {
      answerInput.focus();
      answerInput.setSelectionRange(answerInput.value.length, answerInput.value.length);
    }

    function stopSpelling() {
      cancelPendingSpeech();
      speechRunId += 1;
      window.speechSynthesis.cancel();
    }

    function setActivePractice(type) {
      Object.entries(practiceButtons).forEach(([practiceType, button]) => {
        button.classList.toggle("active", practiceType === type);
      });
    }

    function startRound(type, answer, placeholder, mode = type) {
      currentType = type;
      currentMode = mode;
      currentAnswer = answer;
      answerInput.placeholder = placeholder;
      answerInput.inputMode = type === "phone" ? "tel" : "text";
      answerHelp.textContent = type === "phone"
        ? "Accepted formats: 2485551234, 248 555 1234, 248-555-1234"
        : "";
      setActivePractice(mode);
      resetRound();
      startSpeechTimeoutId = window.setTimeout(() => {
        startSpeechTimeoutId = null;
        speakSpelling();
      }, ROUND_START_DELAY_MS);
    }

    function newName(mode = "name") {
      if (!hasData) {
        setResult("Name data is still loading. Try again in a moment.");
        return;
      }

      const answer = `${getRandomItem(firstNames)} ${getRandomItem(lastNames)}`;
      startRound("name", answer, "First Last", mode);
    }

    function makeNameEmailLocalPart() {
      const first = getRandomItem(firstNames).toLowerCase();
      const last = getRandomItem(lastNames).toLowerCase();
      const firstInitial = first.charAt(0);
      const number = getRandomNumber(1, 99);
      const patterns = [
        `${first}.${last}`,
        `${first}_${last}`,
        `${first}${last}`,
        `${first}.${last}${number}`,
        `${firstInitial}.${last}`,
        `${first}${number}`
      ];

      return getRandomItem(patterns);
    }

    function makeWordEmailLocalPart() {
      const firstWord = getRandomItem(emailWords);
      const secondWord = getRandomItem(emailWords);
      const number = getRandomNumber(1, 99);
      const patterns = [
        `${firstWord}${secondWord}`,
        `${firstWord}.${secondWord}`,
        `${firstWord}_${secondWord}`,
        `${firstWord}${number}`,
        `${firstWord}.${secondWord}${number}`,
        `${firstWord}_${number}`
      ];

      return getRandomItem(patterns);
    }

    function newEmail(mode = "email") {
      if (!hasData) {
        setResult("Email data is still loading. Try again in a moment.");
        return;
      }

      const localPart = Math.random() < 0.6
        ? makeNameEmailLocalPart()
        : makeWordEmailLocalPart();
      const domain = getRandomItem(emailDomains);

      startRound("email", `${localPart}@${domain}`, "example@gmail.com", mode);
    }

    function newPhone(mode = "phone") {
      const areaCode = getRandomItem(michiganAreaCodes);
      const prefix = String(getRandomNumber(200, 999));
      const lineNumber = String(getRandomNumber(0, 9999)).padStart(4, "0");

      startRound("phone", `${areaCode}-${prefix}-${lineNumber}`, "248-555-1234", mode);
    }

    function newSurprise() {
      const surpriseRound = getRandomItem([
        () => newName("surprise"),
        () => newEmail("surprise"),
        () => newPhone("surprise")
      ]);

      surpriseRound();
    }

    function startNextRound() {
      if (currentMode === "surprise") {
        newSurprise();
        return;
      }

      if (currentType === "name") {
        newName();
        return;
      }

      if (currentType === "email") {
        newEmail();
        return;
      }

      if (currentType === "phone") {
        newPhone();
        return;
      }

      setResult(START_MESSAGE);
    }

    async function loadList(path) {
      const response = await fetch(path);

      if (!response.ok) {
        throw new Error(`Could not load ${path}`);
      }

      const names = await response.json();

      if (!Array.isArray(names) || names.length === 0) {
        throw new Error(`${path} is empty or invalid`);
      }

      return names;
    }

    async function loadData() {
      try {
        [firstNames, lastNames, emailWords, emailDomains] = await Promise.all([
          loadList("data/first-names.json"),
          loadList("data/last-names.json"),
          loadList("data/email-words.json"),
          loadList("data/email-domains.json")
        ]);
        hasData = true;
        setDataButtonsEnabled(true);
      } catch (error) {
        console.error(error);
        setResult("Could not load local data files. Start the local server and refresh.", "error");
      }
    }

    function populateVoices() {
      const selectedVoiceName = voiceSelect.value;
      voices = window.speechSynthesis.getVoices();

      voiceSelect.innerHTML = '<option value="">Default voice</option>';

      voices.forEach((voice) => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.appendChild(option);
      });

      voiceSelect.value = selectedVoiceName;
    }

    function getSelectedVoice() {
      return voices.find((voice) => voice.name === voiceSelect.value) || null;
    }

    function updateSpeedLabel() {
      speedValue.textContent = `${Number(speedSlider.value).toFixed(2)}x`;
    }

    function spellCharacters(text, characterNames = { " ": "space" }) {
      return text
        .split("")
        .map((character) => characterNames[character] || character)
        .join(", ");
    }

    function getEmailParts(emailAddress) {
      const [localPart, domain] = emailAddress.split("@");

      if (!localPart || !domain) {
        return null;
      }

      const localPartText = spellCharacters(localPart, emailCharacterNames);
      const domainText = readDomainAsWord.checked
        ? domain.split(".").join(", dot, ")
        : spellCharacters(domain, emailCharacterNames);

      return [localPartText, "at", domainText];
    }

    function readDigitPair(pair) {
      return pair.startsWith("0") ? spellCharacters(pair) : pair;
    }

    function getPhoneGroupText(group, index) {
      if (index === 2 && readLastFourAsPairs.checked) {
        return `${readDigitPair(group.slice(0, 2))}, ${readDigitPair(group.slice(2))}`;
      }

      return spellCharacters(group);
    }

    function getPhoneSpellingText(phoneNumber) {
      return phoneNumber
        .split("-")
        .map(getPhoneGroupText)
        .join(". ");
    }

    function makeUtterance(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      const selectedVoice = getSelectedVoice();

      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }

      utterance.rate = Number(speedSlider.value);
      utterance.pitch = 1;
      return utterance;
    }

    function speakPhoneGroups(phoneNumber, runId) {
      const groups = phoneNumber.split("-");

      speakSpeechParts(groups.map(getPhoneGroupText), PHONE_PAUSE_MS, runId);
    }

    function speakSpeechParts(parts, pauseMs, runId) {
      function speakPart(index) {
        if (runId !== speechRunId || index >= parts.length) {
          return;
        }

        const utterance = makeUtterance(parts[index]);

        if (index < parts.length - 1) {
          utterance.onend = () => {
            window.setTimeout(() => {
              speakPart(index + 1);
            }, pauseMs);
          };
        }

        window.speechSynthesis.speak(utterance);
      }

      speakPart(0);
    }

    function speakEmailParts(emailAddress, runId) {
      const emailParts = getEmailParts(emailAddress);

      if (!emailParts) {
        window.speechSynthesis.speak(makeUtterance(spellCharacters(emailAddress, emailCharacterNames)));
        return;
      }

      speakSpeechParts(emailParts, EMAIL_PAUSE_MS, runId);
    }

    function speakNameParts(name, runId) {
      const nameParts = name
        .split(/\s+/)
        .filter(Boolean)
        .map((part) => spellCharacters(part));

      speakSpeechParts(nameParts, NAME_PAUSE_MS, runId);
    }

    function getNormalEmailParts(emailAddress) {
      const [localPart, domain] = emailAddress.split("@");

      if (!localPart || !domain) {
        return null;
      }

      const localPartText = localPart
        .replace(/\./g, " dot ")
        .replace(/_/g, " underscore ")
        .replace(/-/g, " dash ")
        .replace(/\+/g, " plus ")
        .replace(/\s+/g, " ")
        .trim();
      const domainText = domain.split(".").join(" dot ");

      return [localPartText, "at", domainText];
    }

    function getNormalReadingText() {
      if (currentType === "phone") {
        return getPhoneSpellingText(currentAnswer);
      }

      return currentAnswer;
    }

    function readEmailNormally(runId) {
      const emailParts = getNormalEmailParts(currentAnswer);

      if (!emailParts) {
        window.speechSynthesis.speak(makeUtterance(currentAnswer));
        return;
      }

      speakSpeechParts(emailParts, EMAIL_PAUSE_MS, runId);
    }

    function readNormally() {
      if (!currentAnswer) {
        setResult(START_MESSAGE);
        return;
      }

      if (isCounterEnabled() && readNormallyUsed) {
        return;
      }

      if (isCounterEnabled()) {
        readNormallyUsed = true;
      }

      updateRoundActionButtons();

      focusAnswerAtEnd();
      stopSpelling();

      if (currentType === "email") {
        const runId = speechRunId;
        readEmailNormally(runId);
        return;
      }

      window.speechSynthesis.speak(makeUtterance(getNormalReadingText()));
    }

    function speakSpelling() {
      if (!currentAnswer) {
        setResult(START_MESSAGE);
        return;
      }

      focusAnswerAtEnd();
      stopSpelling();
      const runId = speechRunId;

      if (currentType === "phone" && pausePhoneGroups.checked) {
        speakPhoneGroups(currentAnswer, runId);
        return;
      }

      if (currentType === "email") {
        speakEmailParts(currentAnswer, runId);
        return;
      }

      if (currentType === "name" && pauseNameParts.checked) {
        speakNameParts(currentAnswer, runId);
        return;
      }

      let spellingText = spellCharacters(currentAnswer);

      if (currentType === "phone") {
        spellingText = getPhoneSpellingText(currentAnswer);
      }

      window.speechSynthesis.speak(makeUtterance(spellingText));
    }

    function repeatSpelling() {
      if (isCounterEnabled() && repeatUsed) {
        return;
      }

      if (isCounterEnabled()) {
        repeatUsed = true;
      }

      updateRoundActionButtons();
      speakSpelling();
    }

    function normalize(text) {
      return text.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function getPhoneDigits(phoneNumber) {
      return phoneNumber.replace(/\D/g, "");
    }

    function isValidPhoneAnswer(answer) {
      const trimmedAnswer = answer.trim();

      return /^\d{10}$/.test(trimmedAnswer)
        || /^\d{3} \d{3} \d{4}$/.test(trimmedAnswer)
        || /^\d{3}-\d{3}-\d{4}$/.test(trimmedAnswer);
    }

    function isCorrectAnswer(answer) {
      if (currentType === "phone") {
        return isValidPhoneAnswer(answer)
          && getPhoneDigits(answer) === getPhoneDigits(currentAnswer);
      }

      return normalize(answer) === normalize(currentAnswer);
    }

    function checkAnswer() {
      if (!currentAnswer) {
        setResult(START_MESSAGE);
        correctAnswer.textContent = "";
        return;
      }

      const answer = answerInput.value;
      if (!answer.trim()) {
        setResult("Type your answer first.");
        correctAnswer.textContent = "";
        focusAnswerAtEnd();
        return;
      }

      const isCorrect = isCorrectAnswer(answer);

      if (isCounterEnabled() && !currentRoundCounted) {
        spelledCount += 1;
        currentRoundCounted = true;
      }

      if (isCorrect) {
        if (isCounterEnabled() && !currentRoundCorrect && !currentRoundMissed) {
          correctCount += 1;
        }

        currentRoundCorrect = true;
        setResult("Correct! Press Enter again for the next one.", "success");
        correctAnswer.textContent = "";
      } else {
        if (isCounterEnabled()) {
          currentRoundMissed = true;
        }

        setResult("Incorrect. Make a correction and try again.", "error");
        correctAnswer.textContent = "";
        focusAnswerAtEnd();
      }

      updateProgress();
      updateShowAnswerButton();
      updateNextButton();
    }

    function showCorrectAnswer() {
      if (isCounterEnabled() && !currentRoundMissed) {
        return;
      }

      if (!currentAnswer) {
        setResult(START_MESSAGE);
        correctAnswer.textContent = "";
        return;
      }

      correctAnswer.textContent = `Correct answer: ${currentAnswer}`;
    }

    practiceButtons.name.addEventListener("click", () => newName());
    practiceButtons.email.addEventListener("click", () => newEmail());
    practiceButtons.phone.addEventListener("click", () => newPhone());
    practiceButtons.surprise.addEventListener("click", newSurprise);
    repeatButton.addEventListener("click", repeatSpelling);
    readButton.addEventListener("click", readNormally);
    document.getElementById("stopButton").addEventListener("click", stopSpelling);
    document.getElementById("checkButton").addEventListener("click", checkAnswer);
    nextButton.addEventListener("click", startNextRound);
    showButton.addEventListener("click", showCorrectAnswer);
    document.getElementById("resetCounterButton").addEventListener("click", resetCounter);
    counterToggle.addEventListener("change", updateCounterUI);
    speedSlider.addEventListener("input", updateSpeedLabel);

    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        if (currentRoundCorrect) {
          startNextRound();
        } else {
          checkAnswer();
        }
      }
    });

    setDataButtonsEnabled(false);
    updateCounterUI();
    updateNextButton();
    updateProgress();
    loadData();
    populateVoices();
    updateSpeedLabel();
    window.speechSynthesis.addEventListener("voiceschanged", populateVoices);
  </script>
</body>
</html>
